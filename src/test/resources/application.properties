# Test profile configuration
quarkus.http.port=8081
quarkus.http.test-port=8081

# Override SEFAZ URL to local WireMock for tests
nfcom.sefaz.url=${NFCOM_SEFAZ_URL:http://localhost:8089/NFCom}
nfcom.cert.path=
nfcom.cert.password=
nfcom.truststore.path=

# Rate limiting
nfcom.rate-limit.max-retries=3
nfcom.rate-limit.base-delay-ms=100
