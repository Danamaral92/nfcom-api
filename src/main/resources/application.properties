# Server configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# NFCom SEFAZ configuration
nfcom.cert.path=${NFCOM_CERT_PATH:}
nfcom.cert.password=${NFCOM_CERT_PASSWORD:}
nfcom.sefaz.url=${NFCOM_SEFAZ_URL:https://dfe-portal.svrs.rs.gov.br/NFCom}
nfcom.truststore.path=${NFCOM_TRUSTSTORE_PATH:}

# Rate limiting
nfcom.rate-limit.max-retries=${NFCOM_RATE_LIMIT_MAX_RETRIES:3}
nfcom.rate-limit.base-delay-ms=${NFCOM_RATE_LIMIT_BASE_DELAY_MS:30000}

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=NFCom API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST wrapper for SEFAZ NFCom (Model 62) web services
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
