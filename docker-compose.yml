services:
  nfcom-api:
    build: .
    container_name: nfcom-api
    ports:
      - "8080:8080"
    environment:
      - NFCOM_CERT_PATH=/app/cert.p12
      - NFCOM_CERT_PASSWORD=${NFCOM_CERT_PASSWORD}
      - NFCOM_SEFAZ_URL=${NFCOM_SEFAZ_URL:-https://dfe-portal.svrs.rs.gov.br/NFCom}
      - QUARKUS_HTTP_PORT=8080
    volumes:
      - ./cert.p12:/app/cert.p12:ro
    restart: unless-stopped
